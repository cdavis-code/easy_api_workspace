<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d14;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0a1420;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0175C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#13B9FD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004a80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0175C2;stop-opacity:1" />
    </linearGradient>
    <!-- Generator-specific: gear/code-mode gradient -->
    <linearGradient id="gear-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#13B9FD;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0175C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004a80;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1280" y2="640" stroke="#0175C2" stroke-width="1"/>
    <line x1="1280" y1="0" x2="0" y2="640" stroke="#0175C2" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#0175C2" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#0175C2" stroke-width="1"/>
  </g>

  <!-- Subtle decorative circles -->
  <circle cx="180" cy="160" r="130" fill="#13B9FD" opacity="0.04"/>
  <circle cx="1100" cy="480" r="150" fill="#0175C2" opacity="0.03"/>
  <circle cx="1100" cy="160" r="100" fill="#13B9FD" opacity="0.02"/>
  <circle cx="180" cy="480" r="110" fill="#0175C2" opacity="0.03"/>

  <!-- Logo mark (embedded code brackets + gear for build_runner) -->
  <g transform="translate(530, 95)" filter="url(#glow)">
    <!-- Main logo tile -->
    <rect x="30" y="30" width="140" height="140" rx="28" fill="none" stroke="url(#accent-blue)" stroke-width="3"/>
    <!-- Left code bracket: < -->
    <path d="M76 76 L60 100 L76 124"
          fill="none" stroke="url(#accent-blue)" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Right code bracket: > -->
    <path d="M124 76 L140 100 L124 124"
          fill="none" stroke="url(#accent-blue)" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Interlocking chain links -->
    <circle cx="90" cy="100" r="10"
            fill="none" stroke="url(#accent-blue)" stroke-width="4" opacity="0.8"/>
    <circle cx="110" cy="100" r="10"
            fill="none" stroke="url(#accent-blue)" stroke-width="4" opacity="0.8"/>
    <!-- Inner glow ring -->
    <rect x="30" y="30" width="140" height="140" rx="28" fill="none" stroke="#13B9FD" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- Generator gear accent (right-side visual differentiator) -->
  <g transform="translate(740, 60)" opacity="0.12">
    <circle cx="40" cy="40" r="36" fill="none" stroke="#13B9FD" stroke-width="4"/>
    <circle cx="40" cy="40" r="16" fill="none" stroke="#13B9FD" stroke-width="3"/>
    <line x1="40" y1="0" x2="40" y2="12" stroke="#13B9FD" stroke-width="4"/>
    <line x1="40" y1="68" x2="40" y2="80" stroke="#13B9FD" stroke-width="4"/>
    <line x1="0" y1="40" x2="12" y2="40" stroke="#13B9FD" stroke-width="4"/>
    <line x1="68" y1="40" x2="80" y2="40" stroke="#13B9FD" stroke-width="4"/>
    <line x1="14" y1="14" x2="23" y2="23" stroke="#13B9FD" stroke-width="4"/>
    <line x1="57" y1="57" x2="66" y2="66" stroke="#13B9FD" stroke-width="4"/>
    <line x1="66" y1="14" x2="57" y2="23" stroke="#13B9FD" stroke-width="4"/>
    <line x1="23" y1="57" x2="14" y2="66" stroke="#13B9FD" stroke-width="4"/>
  </g>

  <!-- Connection nodes -->
  <g opacity="0.35">
    <circle cx="180" cy="180" r="5" fill="#13B9FD"/>
    <circle cx="1100" cy="180" r="5" fill="#0175C2"/>
    <circle cx="180" cy="460" r="5" fill="#0175C2"/>
    <circle cx="1100" cy="460" r="5" fill="#13B9FD"/>
    <line x1="180" y1="180" x2="530" y2="150" stroke="#13B9FD" stroke-width="1.5" opacity="0.25"/>
    <line x1="1100" y1="180" x2="750" y2="150" stroke="#0175C2" stroke-width="1.5" opacity="0.25"/>
    <line x1="180" y1="460" x2="530" y2="290" stroke="#0175C2" stroke-width="1.5" opacity="0.25"/>
    <line x1="1100" y1="460" x2="750" y2="290" stroke="#13B9FD" stroke-width="1.5" opacity="0.25"/>
  </g>

  <!-- Title -->
  <text x="640" y="370" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="54" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow-strong)">
    easy_api_generator
  </text>

  <!-- Subtitle -->
  <text x="640" y="415" font-family="Arial, sans-serif" font-size="24" fill="#13B9FD" text-anchor="middle">
    Build Runner code generator for MCP servers and REST APIs
  </text>

  <!-- Description -->
  <text x="640" y="455" font-family="Arial, sans-serif" font-size="18" fill="#7a8b9a" text-anchor="middle">
    MCP · OpenAPI 3.0 · CLI · Code Mode · Node.js Sandbox · Shelf
  </text>

  <!-- pub.dev badge -->
  <g transform="translate(422, 492)">
    <rect x="0" y="0" width="74" height="30" rx="15" fill="#0175C2"/>
    <text x="37" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">pub.dev</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(508, 492)">
    <rect x="0" y="0" width="82" height="30" rx="15" fill="#0a0d14" stroke="#0175C2" stroke-width="1.5"/>
    <text x="41" y="20" font-family="Arial, sans-serif" font-size="14" fill="#13B9FD" text-anchor="middle">v1.2.0</text>
  </g>

  <!-- Dart badge -->
  <g transform="translate(602, 492)">
    <rect x="0" y="0" width="58" height="30" rx="15" fill="#0175C2"/>
    <text x="29" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Dart</text>
  </g>

  <!-- SDK badge -->
  <g transform="translate(672, 492)">
    <rect x="0" y="0" width="92" height="30" rx="15" fill="#0a0d14" stroke="#13B9FD" stroke-width="1"/>
    <text x="46" y="20" font-family="Arial, sans-serif" font-size="13" fill="#13B9FD" text-anchor="middle">SDK ^3.9.0</text>
  </g>

  <!-- Build runner badge -->
  <g transform="translate(776, 492)">
    <rect x="0" y="0" width="92" height="30" rx="15" fill="#0a0d14" stroke="#0175C2" stroke-width="1"/>
    <text x="46" y="20" font-family="Arial, sans-serif" font-size="11" fill="#7a8b9a" text-anchor="middle">build_runner</text>
  </g>

  <!-- Feature icons at bottom -->
  <g opacity="0.75">
    <text x="140" y="570" font-family="Arial, sans-serif" font-size="14" fill="#0175C2" text-anchor="middle">📡 MCP Server</text>
    <text x="340" y="570" font-family="Arial, sans-serif" font-size="14" fill="#13B9FD" text-anchor="middle">📄 OpenAPI 3.0</text>
    <text x="540" y="570" font-family="Arial, sans-serif" font-size="14" fill="#0175C2" text-anchor="middle">💻 CLI Apps</text>
    <text x="740" y="570" font-family="Arial, sans-serif" font-size="14" fill="#13B9FD" text-anchor="middle">⚡ Code Mode</text>
    <text x="940" y="570" font-family="Arial, sans-serif" font-size="14" fill="#0175C2" text-anchor="middle">🔒 Sandbox</text>
    <text x="1120" y="570" font-family="Arial, sans-serif" font-size="14" fill="#13B9FD" text-anchor="middle">🌐 Shelf HTTP</text>
  </g>
</svg>
