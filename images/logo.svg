<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Two-tone, text-free minimalist mark.
       Colors: #0175C2 (Dart blue) + white. High contrast, no gradients. -->

  <!-- Rounded tile background -->
  <rect width="200" height="200" rx="36" ry="36" fill="#0175C2"/>

  <!-- Left code bracket: < (code annotation accent) -->
  <path d="M66 66 L40 100 L66 134"
        fill="none" stroke="#FFFFFF" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right code bracket: > (code annotation accent) -->
  <path d="M134 66 L160 100 L134 134"
        fill="none" stroke="#FFFFFF" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Interlocking chain links (API / server connectivity) -->
  <circle cx="88" cy="100" r="14"
          fill="none" stroke="#FFFFFF" stroke-width="7"/>
  <circle cx="112" cy="100" r="14"
          fill="none" stroke="#FFFFFF" stroke-width="7"/>
</svg>
