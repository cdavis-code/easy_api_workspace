<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <!-- Background -->
  <rect x="0" y="0" width="600" height="120" fill="#0175C2" rx="12"/>
  
  <!-- Logo Icon (embedded from logo-mark.svg, scaled 200→80) -->
  <g transform="translate(30, 20) scale(0.4)">
    <!-- Rounded tile background -->
    <rect width="200" height="200" rx="36" ry="36" fill="#0175C2"/>

    <!-- Left code bracket: < (code annotation accent) -->
    <path d="M66 66 L40 100 L66 134"
          fill="none" stroke="#FFFFFF" stroke-width="12"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right code bracket: > (code annotation accent) -->
    <path d="M134 66 L160 100 L134 134"
          fill="none" stroke="#FFFFFF" stroke-width="12"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Interlocking chain links (API / server connectivity) -->
    <circle cx="88" cy="100" r="14"
            fill="none" stroke="#FFFFFF" stroke-width="7"/>
    <circle cx="112" cy="100" r="14"
            fill="none" stroke="#FFFFFF" stroke-width="7"/>
  </g>
  
  <!-- Project Name with easy on top, api below -->
  <text x="120" y="55" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="white">easy</text>
  <text x="120" y="90" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="#13B9FD">api</text>
  
  <!-- Tagline -->
  <text x="210" y="70" font-family="Arial, sans-serif" font-size="16" 
        fill="white" opacity="0.9">API and MCP Server Generation Made Easy</text>
  
  <!-- Decorative elements -->
  <circle cx="550" cy="30" r="4" fill="#13B9FD" opacity="0.6"/>
  <circle cx="570" cy="50" r="3" fill="#13B9FD" opacity="0.4"/>
  <circle cx="560" cy="80" r="5" fill="#13B9FD" opacity="0.5"/>
</svg>
